<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Queso!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0005;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .container {
            text-align: center;
            z-index: 2;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 3.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
            animation: pulse 2s infinite alternate;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1.5rem;
            color: #ffb3d9;
            text-shadow: 0 0 8px #ff007f;
            font-weight: bold;
            margin-bottom: 40px;
        }
        
        /* Panel de la pregunta */
        .question-box {
            background: rgba(255, 0, 127, 0.1);
            border: 2px solid #ff007f;
            border-radius: 15px;
            padding: 35px 25px;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
            backdrop-filter: blur(5px);
            position: relative; /* Clave: Ahora el botón NO se moverá relativo a TODA la tarjeta rosa */
        }
        .question-box p {
            font-size: 1.8rem;
            color: #ffffff;
            text-shadow: 0 0 5px #ff007f;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        /* Contenedor de Botones */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        /* Contenedor fantasma para el botón NO: Mantiene el espacio del No intacto */
        .btn-no-wrapper {
            width: 105px;  /* Ancho aproximado del botón NO con su padding */
            height: 50px;  /* Alto aproximado del botón */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }
        #btnSi {
            background-color: #ff007f;
            color: white;
            z-index: 5;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        #btnSi:hover {
            background-color: #ff3399;
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff007f;
        }
        #btnNo {
            background-color: #444;
            color: #ccc;
            z-index: 4;
            transition: top 0.1s ease, left 0.1s ease; /* Transición suave opcional cuando salte */
        }

        /* Modal / Ventana emergente */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a000b;
            border: 3px solid #ff007f;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px #ff007f;
            max-width: 400px;
            width: 80%;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-content h2 {
            color: #ffffff;
            font-size: 2.2rem;
            text-shadow: 0 0 10px #ff007f;
            margin-bottom: 15px;
        }
        .modal-content p {
            color: #ffb3d9;
            font-size: 1.3rem;
            margin-bottom: 25px;
        }
        .modal-content button {
            padding: 10px 25px;
            background-color: #ff007f;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(0.98); text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f; }
            100% { transform: scale(1.02); text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f, 0 0 60px #ff007f; }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="container">
        <h1>¡Feliz Cumpleaños, Queso! 💖</h1>
        <p class="subtitle">Si es niña Git, si es niño Hub</p>
        
        <div class="question-box" id="questionBox">
            <p>¿Me quieres? </p>
            <div class="btn-container">
                <button class="btn" id="btnSi">SÍ</button>
                <div class="btn-no-wrapper">
                    <button class="btn" id="btnNo">NO</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modalSorpresa">
        <div class="modal-content">
            <h2>Obvio que me quieres PES, nadie como yo</h2>
            <p>Sabía que ibas a decir que sí. ¡Te quiero mucho, mi amol :P!</p>
            <button onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);

        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = Math.random() * -canvas.height;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(13, 0, 5, 0.08)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px Arial';

            for (let i = 0; i < rainDrops.length; i++) {
                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#ffffff'; 
                } else {
                    ctx.fillStyle = '#ff007f'; 
                }

                const text = '♥';
                const xCoordinate = i * fontSize;
                const yCoordinate = rainDrops[i];

                ctx.fillText(text, xCoordinate, yCoordinate);

                if (yCoordinate > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i] += fontSize;
            }
        }
        setInterval(drawMatrix, 40);


        const btnSi = document.getElementById('btnSi');
        const btnNo = document.getElementById('btnNo');
        const questionBox = document.getElementById('questionBox');
        const modal = document.getElementById('modalSorpresa');

        function moverBotonNo() {
            if (btnNo.style.position !== 'absolute') {
                btnNo.style.position = 'absolute';
            }

            const padding = 20;
            const maxX = questionBox.clientWidth - btnNo.clientWidth - padding;
            const maxY = questionBox.clientHeight - btnNo.clientHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        btnNo.addEventListener('mouseover', moverBotonNo);
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moverBotonNo();
        });

        btnSi.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        function cerrarModal() {
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
